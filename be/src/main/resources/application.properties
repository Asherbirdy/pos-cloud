# PostgreSQL database connection
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.port=8083

# JWT
jwt.secret=your-256-bit-secret-key-change-this-in-production
jwt.access-token-expiration-ms=300000
jwt.refresh-token-expiration-ms=86400000

server.error.include-message=always

# CORS (comma-separated list of allowed origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

# Email verification code
auth.email-code.ttl-seconds=300
auth.email-code.resend-cooldown-seconds=60
auth.email-code.max-attempts=5