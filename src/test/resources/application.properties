# PostgreSQL database connection
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:test
spring.datasource.username=sa
spring.datasource.password=sa
server.port=8083

# JWT
jwt.secret=your-256-bit-secret-key-change-this-in-production
jwt.access-token-expiration-ms=300000
jwt.refresh-token-expiration-ms=86400000

server.error.include-message=always

spring.sql.init.mode=always

cors.allowed-origins=http://localhost:1207

# 測試環境：關掉 OTP 重送冷卻，避免同一帳號在多個測試裡連續打 step1 被擋
auth.email-code.resend-cooldown-seconds=0

# 測試環境不真的寄信，避免缺少 spring.mail.host 造成 auto-config 失敗
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=test
mail.from=test@example.com